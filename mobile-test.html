<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANTON | SHOP (RECHTSSICHER)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap&subset=latin-ext" rel="stylesheet">
    <style>
        :root {
            --anton-red: #ff0000;
            --anton-yellow: #ffeb3b;
            --sidebar-width: 240px;
            --apple-gray: #A2AAAD;
            --glass: rgba(255,255,255,0.63);
        }

        /* Dein Original-Grunddesign */
        html, body { margin: 0; padding: 0; background-color: transparent; font-family: 'Special Elite', cursive; height: 100%; width: 100%; }
        
        @media (min-width: 801px) {
            html { background: url('Background.jpg') no-repeat center center fixed; background-size: cover; }
            body { background: transparent; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }
            .d-header { position: fixed; top: 0; width: 100%; height: 80px; display: flex; justify-content: center; align-items: center; z-index: 100; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border-bottom: 2px solid #000; }
            .d-header-logo { max-height: 285px; transform: translateY(82px); filter: brightness(0) saturate(100%) invert(13%) sepia(95%) saturate(7408%) hue-rotate(359deg) brightness(97%) contrast(113%); }
            
            /* Sidebar-Styles aus deinem Original */
            .d-sidebar-left { position: fixed; top: 0; bottom: 0; left: -300px; width: var(--sidebar-width); background: rgba(255,235,59,0.98); z-index: 200; padding: 100px 15px; transition: left 0.4s ease; border-right: 2px solid #000; }
            .d-sidebar-left.open { left: 0; }
            .d-menu-btn { position: fixed; top: 18px; left: 20px; z-index: 210; background: #000; color: #fff; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 5px; cursor: pointer; }
            
            main { flex: 1; padding: 120px 55px 80px 55px; z-index: 5; }
        }

        /* ECWID DESIGN-ANPASSUNG (Hybrid-Logik) */
        #my-store-132126030 {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 3px solid #000;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.5);
        }

        /* Zwinge Ecwid, deine Schrift zu nutzen */
        .ec-size .ec-store, .ec-size .ec-store .ec-text-default {
            font-family: 'Special Elite', cursive !important;
            color: #000 !important;
        }

        /* Button-Styling passend zu deinem Shop */
        .ec-size .ec-store .form-control__button {
            background-color: var(--anton-red) !important;
            border: 2px solid #000 !important;
            border-radius: 8px !important;
            color: #fff !important;
            text-transform: uppercase !important;
            box-shadow: 3px 3px 0 #000 !important;
        }

        /* Verstecke Ecwid-Footer für sauberen Look */
        .ec-size .ec-store__footer { display: none !important; }

        /* Rechts-Sidebar Social Icons (Original Animation) */
        .d-sidebar-right { position: fixed; top: 50%; right: 0; transform: translateY(-50%); width: 50px; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 999; background: rgba(255,255,255,0.2); backdrop-filter: blur(3px); padding: 25px 0; border-radius: 20px 0 0 20px; }
        .d-sidebar-right a i { color: #000; font-size: 1.2rem; animation: ultraFlowWave 6s linear infinite; }
        @keyframes ultraFlowWave { 0%{transform:scale(1);color:#000;}9.33%{transform:scale(1.55);color:var(--brand-color);}23.33%,100%{transform:scale(1);color:#000;} }
        
        /* Mobile Fixes */
        @media (max-width: 800px) {
            .m-header { height: 80px; background: rgba(255,255,255,0.8); border-bottom: 2px solid #000; position: relative; z-index: 1000; }
            .m-content-scroll { padding: 100px 10px 80px 10px; overflow-y: auto; height: 100vh; }
        }
    </style>
</head>
<body>

<div id="desktop-wrapper">
    <header class="d-header">
        <img src="Antonlogo.png" alt="ANTON Logo" class="d-header-logo">
    </header>
    <div class="d-menu-btn" onclick="toggleMenu()"><span>☰</span></div>

    <nav class="d-sidebar-left" id="sidebar">
        <div style="margin-bottom:20px"><a href="hauptseite.html" style="text-decoration:none; color:#000;"><i class="fa-solid fa-house"></i> START</a></div>
        <div style="margin-bottom:20px"><a href="meinemusik.html" style="text-decoration:none; color:#000;"><i class="fa-solid fa-music"></i> MUSIK</a></div>
        <div style="margin-bottom:20px"><a href="shop.html" style="text-decoration:none; color:#000; font-weight:bold;"><i class="fa-solid fa-cart-shopping"></i> SHOP</a></div>
    </nav>

    <aside class="d-sidebar-right">
        <a href="#" style="--brand-color:#f00"><i class="fa-brands fa-youtube"></i></a>
        <a href="#" style="--brand-color:#25F4EE"><i class="fa-brands fa-tiktok"></i></a>
        <a href="#" style="--brand-color:#E1306C"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" style="--brand-color:#A2AAAD"><i class="fa-brands fa-apple"></i></a>
    </aside>

    <main>
        <div id="my-store-132126030"></div>
        <div>
            <script data-cfasync="false" type="text/javascript" src="https://app.ecwid.com/script.js?132126030&data_platform=code&data_date=2026-02-28" charset="utf-8"></script>
            <script type="text/javascript"> 
                xProductBrowser("categoriesPerRow=3","views=grid(20,3) list(60) table(60)","categoryView=grid","searchView=list","id=my-store-132126030");
            </script>
        </div>
    </main>
</div>

<script>
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
    }
    // Automatisches Schließen nach 5s
    let timeout;
    document.addEventListener('mousemove', () => {
        clearTimeout(timeout);
        timeout = setTimeout(() => document.getElementById('sidebar').classList.remove('open'), 5000);
    });
</script>

</html>
