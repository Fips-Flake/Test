<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANTON | SHOP 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap&subset=latin-ext" rel="stylesheet">
    <style>
        :root {
            --anton-red: #ff0000;
            --anton-yellow: #ffeb3b;
            --apple-gray: #A2AAAD;
        }

        html, body { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Special Elite', cursive; overflow: hidden; background-color: #f5f5f7; }

        /* Background Fix */
        .bg-layer { position: fixed; inset: 0; background: url('Background.jpg') no-repeat center center; background-size: cover; z-index: -1; }

        /* ==================== DESKTOP STYLES ==================== */
        @media (min-width: 801px) {
            #mobile-wrapper { display: none !important; }
            body { display: flex; flex-direction: column; }
            .d-header { position: fixed; top: 0; width: 100%; height: 80px; display: flex; justify-content: center; align-items: center; z-index: 1000; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border-bottom: 2px solid #000; }
            .d-header-logo { max-height: 285px; transform: translateY(82px); filter: brightness(0) saturate(100%) invert(13%) sepia(95%) saturate(7408%) hue-rotate(359deg) brightness(97%) contrast(113%); }
            
            .d-sidebar-left { position: fixed; top: 0; bottom: 0; left: -260px; width: 240px; background: var(--anton-yellow); z-index: 2000; padding: 100px 15px; transition: left 0.4s ease; border-right: 2px solid #000; }
            .d-sidebar-left.open { left: 0; }
            .d-menu-btn { position: fixed; top: 18px; left: 20px; z-index: 2100; background: #000; color: #fff; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 5px; cursor: pointer; }

            main { padding: 140px 80px 40px 80px; flex: 1; overflow-y: auto; }
        }

        /* ==================== MOBILE STYLES ==================== */
        @media (max-width: 800px) {
            #desktop-wrapper { display: none !important; }
            #mobile-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: relative; }
            
            .m-header { height: 70px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 2px solid #000; display: flex; justify-content: center; align-items: center; position: relative; z-index: 3000; }
            .m-header-logo { max-height: 120px; position: absolute; top: 40px; filter: brightness(0) saturate(100%) invert(13%) sepia(95%) saturate(7408%) hue-rotate(359deg) brightness(97%) contrast(113%); }
            
            .m-menu-btn { position: absolute; left: 15px; top: 15px; background: #000; width: 40px; height: 40px; border-radius: 5px; display: flex; align-items: center; justify-content: center; color: #fff; }
            
            .m-sidebar { position: fixed; top: -100px; left: 0; width: 100%; height: 90px; background: var(--anton-yellow); border-bottom: 3px solid #000; z-index: 2500; transition: top 0.4s ease; display: flex; justify-content: space-around; align-items: center; padding-top: 10px; }
            .m-sidebar.open { top: 0; }

            .m-content-scroll { flex: 1; overflow-y: scroll; -webkit-overflow-scrolling: touch; padding: 110px 15px 80px 15px; }
        }

        /* ==================== ECWID HYBRID FIXES ==================== */
        #my-store-132126030 {
            background: rgba(255,255,255,0.7) !important;
            border: 3px solid #000 !important;
            border-radius: 15px !important;
            min-height: 400px;
        }

        /* Zwinge Ecwid auf Mobile in eine Spalte */
        @media (max-width: 600px) {
            .ec-size .ec-store .grid__content {
                padding: 0 !important;
            }
        }

        /* Social Sidebar (Animation bleibt!) */
        .sidebar-right { position: fixed; top: 50%; right: 0; transform: translateY(-50%); width: 45px; background: rgba(255,255,255,0.3); backdrop-filter: blur(5px); border-radius: 15px 0 0 15px; display: flex; flex-direction: column; align-items: center; gap: 15px; padding: 20px 0; z-index: 2900; }
        .sidebar-right a i { color: #000; font-size: 1.2rem; animation: ultraFlowWave 6s linear infinite; }
        @keyframes ultraFlowWave { 0%{transform:scale(1);color:#000;}9.33%{transform:scale(1.5);color:var(--brand-color);}23.33%,100%{transform:scale(1);color:#000;} }
    </style>
</head>
<body>
<div class="bg-layer"></div>

<div id="desktop-wrapper">
    <header class="d-header"><img src="Antonlogo.png" class="d-header-logo"></header>
    <div class="d-menu-btn" onclick="tglM()">☰</div>
    <nav class="d-sidebar-left" id="d-sdbr">
        <a href="hauptseite.html" style="display:block; margin-bottom:20px; color:#000; text-decoration:none;"><i class="fa-solid fa-house"></i> START</a>
        <a href="shop.html" style="display:block; color:#000; text-decoration:none; font-weight:bold;"><i class="fa-solid fa-cart-shopping"></i> SHOP</a>
    </nav>
    <main>
        <div id="my-store-132126030"></div>
    </main>
</div>

<div id="mobile-wrapper">
    <header class="m-header">
        <div class="m-menu-btn" onclick="tglM()">☰</div>
        <img src="Antonlogo.png" class="m-header-logo">
    </header>
    <nav class="m-sidebar" id="m-sdbr">
        <a href="hauptseite.html" style="color:#000; text-decoration:none;"><i class="fa-solid fa-house"></i><br><small>Start</small></a>
        <a href="shop.html" style="color:#000; text-decoration:none; font-weight:bold;"><i class="fa-solid fa-cart-shopping"></i><br><small>Shop</small></a>
    </nav>
    <div class="m-content-scroll">
        <div id="my-store-132126030-m"></div>
    </div>
</div>

<aside class="sidebar-right">
    <a href="#" style="--brand-color:#f00"><i class="fa-brands fa-youtube"></i></a>
    <a href="#" style="--brand-color:#25F4EE"><i class="fa-brands fa-tiktok"></i></a>
    <a href="#" style="--brand-color:#E1306C"><i class="fa-brands fa-instagram"></i></a>
</aside>

<script data-cfasync="false" type="text/javascript" src="https://app.ecwid.com/script.js?132126030&data_platform=code&data_date=2026-02-28" charset="utf-8"></script>
<script type="text/javascript">
    // Gemeinsame Funktion für beide Views
    function loadEcwid(targetId) {
        xProductBrowser(
            "categoriesPerRow=3",
            "views=grid(20,3) list(60) table(60)",
            "categoryView=grid",
            "searchView=list",
            "id=" + targetId
        );
    }

    // Initialisierung basierend auf Viewport
    if(window.innerWidth > 800) {
        loadEcwid("my-store-132126030");
    } else {
        // Auf Mobilgeräten erzwingen wir eine kompaktere Ansicht
        xProductBrowser("categoriesPerRow=1", "id=my-store-132126030-m");
    }

    function tglM() {
        document.getElementById('d-sdbr').classList.toggle('open');
        document.getElementById('m-sdbr').classList.toggle('open');
    }
</script>
</body>
</html>
