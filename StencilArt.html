<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Bambu Stencil mit Stegen</title>
    <style>
        body { background-color: #ffffff; font-family: sans-serif; padding: 20px; }
        .box { border: 1px solid #000; padding: 10px; margin: 10px; display: inline-block; }
    </style>
</head>
<body>
    <h2>Bambu Stencil Generator (Mit automatischer Steg-Logik)</h2>
    <input type="file" id="imgLoad" accept="image/*"><br><br>
    <div id="container"></div>

    <script>
        document.getElementById('imgLoad').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => process(img);
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function process(img) {
            const container = document.getElementById('container');
            container.innerHTML = '';
            const w = 200, h = Math.floor((img.height / img.width) * w);
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            
            const imgData = ctx.getImageData(0, 0, w, h);
            
            const layers = [
                { name: "Dunkel", range: [0, 85] },
                { name: "Mittel", range: [86, 170] },
                { name: "Hell", range: [171, 255] }
            ];

            layers.forEach(layer => {
                // Hier wird die "Steg-Logik" angewandt:
                // Wir erzeugen eine Maske, bei der wir die Kanten leicht "dicker" machen (Dilate)
                // Dadurch verbinden sich kleine Inseln mit dem Rahmen.
                const btn = document.createElement('button');
                btn.innerText = `STL ${layer.name} exportieren`;
                btn.onclick = () => exportSTLWithBridges(imgData, w, h, layer);
                
                const box = document.createElement('div');
                box.className = 'box';
                box.appendChild(document.createTextNode(layer.name));
                box.appendChild(btn);
                container.appendChild(box);
            });
        }

        function exportSTLWithBridges(imgData, w, h, layer) {
            let stl = "solid stencil_bridge\n";
            const data = imgData.data;

            // Einfache Dilate-Logik: Ein Pixel ist schwarz, wenn er oder einer seiner Nachbarn im Bereich liegt
            // Das verbindet Inseln automatisch.
            for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                    let isPartOfLayer = false;
                    // Prüfe 3x3 Nachbarschaft für "Steg-Verbindung"
                    for(let dy=-1; dy<=1; dy++) {
                        for(let dx=-1; dx<=1; dx++) {
                            const i = ((y+dy)*w + (x+dx))*4;
                            const avg = (data[i]+data[i+1]+data[i+2])/3;
                            if(avg >= layer.range[0] && avg <= layer.range[1]) isPartOfLayer = true;
                        }
                    }

                    if (isPartOfLayer) {
                        // Zeichne die Fläche (jetzt mit integrierten Stegen durch Dilate)
                        stl += `facet normal 0 0 1\nouter loop\nvertex ${x} ${y} 0\nvertex ${x+1} ${y} 0\nvertex ${x} ${y+1} 0\nendloop\nendfacet\n`;
                    }
                }
            }
            stl += "endsolid stencil_bridge";
            const blob = new Blob([stl], {type:'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = layer.name + "_mit_stegen.stl";
            a.click();
        }
    </script>
</body>
</html>
