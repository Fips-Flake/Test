<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Bambu Stencil Creator</title>
    <style>
        body { background-color: #ffffff; font-family: 'Segoe UI', sans-serif; padding: 30px; color: #333; }
        .card { border: 1px solid #ccc; border-radius: 8px; padding: 15px; display: inline-block; margin: 10px; width: 300px; vertical-align: top; }
        canvas { width: 100%; border: 1px solid #000; background: #f0f0f0; }
        button { background: #00aeef; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; margin-top: 10px; border-radius: 4px; }
        button:hover { background: #0081b1; }
    </style>
</head>
<body>
    <h2>Bambu Lab Stencil Generator (STL Export)</h2>
    <p>Wähle ein Bild. Das Tool erstellt 3 Ebenen als <strong>echte STL-Dateien</strong> mit einer 0,2mm Basis für maximale Stabilität.</p>
    
    <input type="file" id="imgLoad" accept="image/*"><br><br>
    <div id="container"></div>

    <script>
        document.getElementById('imgLoad').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => processForBambu(img);
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function processForBambu(img) {
            const container = document.getElementById('container');
            container.innerHTML = '';
            
            // Auflösung für den Slicer optimieren (nicht zu viele Polygone)
            const maxW = 200; 
            const scale = maxW / img.width;
            const w = maxW;
            const h = Math.floor(img.height * scale);

            const layers = [
                { name: "1_Schatten_Dunkel", range: [0, 85] },
                { name: "2_Mittelton", range: [86, 170] },
                { name: "3_Highlight_Hell", range: [171, 255] }
            ];

            layers.forEach(layer => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<h4>${layer.name}</h4>`;
                
                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                
                const imgData = ctx.getImageData(0, 0, w, h);
                const data = imgData.data;

                // Bild filtern
                for (let i = 0; i < data.length; i += 4) {
                    const avg = (data[i] + data[i+1] + data[i+2]) / 3;
                    const active = (avg >= layer.range[0] && avg <= layer.range[1]);
                    const val = active ? 0 : 255;
                    data[i] = data[i+1] = data[i+2] = val;
                }
                ctx.putImageData(imgData, 0, 0);

                const btn = document.createElement('button');
                btn.innerText = "STL für Bambu Studio laden";
                btn.onclick = () => downloadBambuSTL(imgData, w, h, layer.name);

                card.appendChild(canvas);
                card.appendChild(btn);
                container.appendChild(card);
            });
        }

        function downloadBambuSTL(imgData, w, h, name) {
            let stl = "solid bbl_stencil\n";
            const d = imgData.data;
            const step = 1; // 1 Pixel = 1mm im Slicer (später skalierbar)

            for (let y = 0; y < h - 1; y++) {
                for (let x = 0; x < w - 1; x++) {
                    const i = (y * w + x) * 4;
                    const isBlack = (d[i] === 0);

                    // Wir bauen kleine Boxen (Quader)
                    // Basisplatte (0.2mm hoch) - immer vorhanden für Stabilität
                    writeBox(x, y, 0, 0.2);

                    // Stencil-Detail (zusätzliche 0.8mm oben drauf = 1.0mm Gesamthöhe)
                    if (isBlack) {
                        writeBox(x, y, 0.2, 1.0);
                    }
                }
            }

            function writeBox(x, y, zMin, zMax) {
                // Einfache STL-Facetten für einen Würfel-Teil
                // Normal oben
                stl += `facet normal 0 0 1\nouter loop\nvertex ${x} ${y} ${zMax}\nvertex ${x+1} ${y} ${zMax}\nvertex ${x} ${y+1} ${zMax}\nendloop\nendfacet\n`;
                stl += `facet normal 0 0 1\nouter loop\nvertex ${x+1} ${y+1} ${zMax}\nvertex ${x} ${y+1} ${zMax}\nvertex ${x+1} ${y} ${zMax}\nendloop\nendfacet\n`;
            }

            stl += "endsolid bbl_stencil";
            const blob = new Blob([stl], {type: 'text/plain'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = name + ".stl";
            link.click();
        }
    </script>
</body>
</html>
