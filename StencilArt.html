<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Stencil-Vorbereiter für Bambu Lab</title>
    <style>
        body { background-color: #ffffff; font-family: sans-serif; padding: 20px; }
        .layer-preview { margin: 10px; padding: 10px; border: 1px solid #ccc; display: inline-block; }
    </style>
</head>
<body>
    <h2>Stencil-Bilder für Bambu Studio</h2>
    <input type="file" id="upload" accept="image/*">
    <div id="output"></div>

    <script>
        document.getElementById('upload').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => createLayers(img);
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function createLayers(img) {
            const out = document.getElementById('output');
            out.innerHTML = '';
            const w = 500, h = (img.height / img.width) * w;
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            const data = ctx.getImageData(0, 0, w, h).data;

            const levels = [
                {name: "Highlight", range: [171, 255]},
                {name: "Mittelton", range: [86, 170]},
                {name: "Schatten", range: [0, 85]}
            ];

            levels.forEach(lvl => {
                const c = document.createElement('canvas');
                c.width = w; c.height = h;
                const cCtx = c.getContext('2d');
                cCtx.fillStyle = "white"; cCtx.fillRect(0,0,w,h);
                const d = cCtx.getImageData(0,0,w,h);
                
                for(let i=0; i<data.length; i+=4) {
                    const avg = (data[i]+data[i+1]+data[i+2])/3;
                    if(avg >= lvl.range[0] && avg <= lvl.range[1]) {
                        d.data[i] = d.data[i+1] = d.data[i+2] = 0; // Schwarz = Material
                    }
                }
                cCtx.putImageData(d,0,0);
                
                const div = document.createElement('div');
                div.className = 'layer-preview';
                div.innerHTML = `<h4>${lvl.name}</h4>`;
                div.appendChild(c);
                div.innerHTML += `<br><a href="${c.toDataURL()}" download="${lvl.name}.png">Als PNG speichern</a>`;
                out.appendChild(div);
            });
        }
    </script>
</body>
</html>
