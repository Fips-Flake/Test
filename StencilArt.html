<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Stencil mit Basis-Platte</title>
    <style>
        body { background-color: #ffffff; font-family: sans-serif; padding: 20px; }
        .layer-box { display: inline-block; margin: 10px; border: 1px solid #ccc; padding: 10px; }
        canvas { display: block; border: 1px solid #000; }
    </style>
</head>
<body>
    <h2>Stencil-Generator mit Verbindungs-Basis</h2>
    <input type="file" id="upload" accept="image/*">
    <div id="output"></div>

    <script>
        document.getElementById('upload').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => processImage(img);
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function processImage(img) {
            const output = document.getElementById('output');
            output.innerHTML = '';
            const w = 300, h = Math.floor((img.height / img.width) * w);

            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            const imgData = ctx.getImageData(0, 0, w, h);

            // Drei Schichten erzeugen
            for(let layer=1; layer<=3; layer++) {
                const threshold = layer * 60;
                const container = document.createElement('div');
                container.className = 'layer-box';
                container.innerHTML = `<h4>Ebene ${layer}</h4>`;
                
                // Canvas für Vorschau
                const c = document.createElement('canvas');
                c.width = w; c.height = h;
                const cCtx = c.getContext('2d');
                cCtx.fillStyle = 'white'; cCtx.fillRect(0,0,w,h);
                
                const pixels = imgData.data;
                for(let i=0; i<pixels.length; i+=4) {
                    const avg = (pixels[i]+pixels[i+1]+pixels[i+2])/3;
                    if(avg < threshold) {
                        cCtx.fillStyle = 'black';
                        cCtx.fillRect((i/4)%w, Math.floor(i/4/w), 1, 1);
                    }
                }
                
                const btn = document.createElement('button');
                btn.innerText = "STL mit Basis laden";
                btn.onclick = () => exportSTL(cCtx.getImageData(0,0,w,h), w, h);
                
                container.appendChild(c);
                container.appendChild(btn);
                output.appendChild(container);
            }
        }

        function exportSTL(imgData, w, h) {
            let stl = "solid stencil\n";
            const d = imgData.data;
            // Basis-Platte (Z=0.2mm)
            for(let y=0; y<h; y+=2) {
                for(let x=0; x<w; x+=2) {
                    // Zeichne Basis
                    stl += `facet normal 0 0 1\nouter loop\nvertex ${x} ${y} 0.2\nvertex ${x+2} ${y} 0.2\nvertex ${x} ${y+2} 0.2\nendloop\nendfacet\n`;
                    // Zeichne Stencil-Element (Z=1.0mm)
                    if(d[(y*w+x)*4] === 0) {
                        stl += `facet normal 0 0 1\nouter loop\nvertex ${x} ${y} 1.0\nvertex ${x+2} ${y} 1.0\nvertex ${x} ${y+2} 1.0\nendloop\nendfacet\n`;
                    }
                }
            }
            stl += "endsolid stencil";
            const blob = new Blob([stl], {type:'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "stencil_base.stl";
            a.click();
        }
    </script>
</body>
</html>
