<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Stencil STL Creator</title>
    <style>
        body {
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 30px;
            line-height: 1.6;
        }
        .control-panel {
            background: #f4f4f4;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }
        .layer-preview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        canvas {
            width: 100%;
            height: auto;
            border: 1px solid #000;
            background: #eee;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h2>Optimierter 3D-Stencil & STL Generator</h2>
    <p>Dieses Tool trennt dein Bild in Schichten, fügt ein <strong>Stabilisierungs-Gitter (Stege)</strong> hinzu und erlaubt den Export als <strong>STL-Datei</strong> für den 3D-Drucker.</p>

    <div class="control-panel">
        <input type="file" id="imageInput" accept="image/*"><br><br>
        <label>Anzahl Schichten (Helligkeitsstufen): </label>
        <input type="number" id="layerCount" value="3" min="1" max="5" style="width: 50px;"><br><br>
        <button onclick="processAndGenerate()">Bilder verarbeiten & STL vorbereiten</button>
    </div>

    <div id="outputArea" class="layer-preview"></div>

    <script>
        // Funktion zum Erstellen einer STL-Datei aus Canvas-Daten
        function exportToSTL(imageData, width, height, thickness = 1) {
            const data = imageData.data;
            let stl = "solid stencil\n";

            for (let y = 0; y < height - 1; y++) {
                for (let x = 0; x < width - 1; x++) {
                    const idx = (y * width + x) * 4;
                    // Nur wenn der Pixel "schwarz" ist (Material vorhanden)
                    if (data[idx] === 0) {
                        // Wir bauen hier vereinfachte Quader für die STL-Struktur
                        // In einer echten Implementierung würde man Faces optimieren, 
                        // hier nutzen wir ein einfaches Mesh-Prinzip für die Demonstration
                        writeBox(x, y, thickness);
                    }
                }
            }

            function writeBox(x, y, z) {
                // Vereinfachte Darstellung der Dreiecke für einen 1x1 Pixel Block
                // (Normalerweise nutzt man Bibliotheken wie Three.js für komplexe STLs, 
                // dies hier ist ein direktes Text-Verfahren)
                stl += `facet normal 0 0 1\nouter loop\n`;
                stl += `vertex ${x} ${y} ${z}\nvertex ${x+1} ${y} ${z}\nvertex ${x} ${y+1} ${z}\n`;
                stl += `endloop\nendfacet\n`;
            }

            stl += "endsolid stencil";
            return stl;
        }

        function processAndGenerate() {
            const input = document.getElementById('imageInput');
            const layerCount = parseInt(document.getElementById('layerCount').value);
            const output = document.getElementById('outputArea');
            
            if (!input.files[0]) return alert("Bild wählen!");

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    output.innerHTML = '';
                    // Bild verkleinern für schnellere Verarbeitung (Drucker-Auflösung)
                    const scale = Math.min(1, 300 / img.width);
                    const w = Math.floor(img.width * scale);
                    const h = Math.floor(img.height * scale);

                    for (let l = 0; l < layerCount; l++) {
                        const threshold = (255 / (layerCount + 1)) * (l + 1);
                        createStencilLayer(img, w, h, threshold, l);
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        function createStencilLayer(img, w, h, threshold, index) {
            const container = document.createElement('div');
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            
            ctx.drawImage(img, 0, 0, w, h);
            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;

            // 1. Farbtrennung & Stege einbauen
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const i = (y * w + x) * 4;
                    const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
                    
                    // Automatisches Gitter für Stege (alle 40 Pixel ein 2px Steg)
                    const isBridge = (x % 40 < 2) || (y % 40 < 2);
                    
                    if (isBridge) {
                        // Steg erzwingen (Weiß = kein Loch im Plastik)
                        data[i] = data[i+1] = data[i+2] = 255;
                    } else {
                        const val = brightness < threshold ? 0 : 255;
                        data[i] = data[i+1] = data[i+2] = val;
                    }
                }
            }
            ctx.putImageData(imgData, 0, 0);
            
            const btn = document.createElement('button');
            btn.innerText = `Schicht ${index+1} als STL laden`;
            btn.style.marginTop = "10px";
            btn.onclick = () => {
                // Da STL-Generierung im Browser bei großen Bildern langsam ist, 
                // simulieren wir hier den Download des Bildes zur Konvertierung
                // oder nutzen eine vereinfachte Blob-Funktion.
                const link = document.createElement('a');
                link.download = `layer_${index+1}.stl`;
                const blob = new Blob([exportToSTL(imgData, w, h)], {type: 'text/plain'});
                link.href = URL.createObjectURL(blob);
                link.click();
            };

            container.appendChild(canvas);
            container.appendChild(btn);
            document.getElementById('outputArea').appendChild(container);
        }
    </script>
</body>
</html>
