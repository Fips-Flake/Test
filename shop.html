<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANTON | SHOP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

            --anton-yellow: #ffeb3b;
            --sidebar-width: 240px;
            --apple-gray: #A2AAAD;
            --amazon-blue: #00A8E1;
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Special Elite', cursive;
            height: 100%;
            width: 100%;
        }

        /* ================================================================= */


        /* ================================================================= */
        /* 1. DESKTOP STYLES                                                  */
        /* ================================================================= */
        @media (min-width: 801px) {
            #mobile-wrapper { display: none !important; }

            body {
                background: #ffffff url('Background.jpg') no-repeat center center fixed;
                background-size: cover !important;
                background-attachment: fixed;
                overflow-x: hidden;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }

            .d-header {
                position: fixed; top: 0; width: 100%; height: 80px;
                display: flex; justify-content: center; align-items: center;
                z-index: 100; background: rgba(255, 255, 255, 0.8);
                backdrop-filter: blur(10px); border-bottom: 2px solid #000;
            }

            .d-header-logo {
                max-height: 285px;
                width: auto;
                object-fit: contain;
                filter: brightness(0) saturate(100%) invert(13%) sepia(95%) saturate(7408%) hue-rotate(359deg) brightness(97%) contrast(113%);
                transform: translateY(82px);
            }

            .d-menu-btn {
                position: fixed; top: 18px; left: 20px; font-size: 24px; cursor: pointer;
                z-index: 210; background: #000; color: #fff; width: 45px; height: 45px;
                display: flex; align-items: center; justify-content: center;
                border-radius: 5px; transition: all 0.3s ease; border: 2px solid #000;
                overflow: hidden;
            }
            .d-menu-btn:hover { background: var(--anton-yellow); color: #000; }
            .d-menu-btn span { transition: opacity 0.2s; }
            .d-menu-btn::after { content: 'A'; position: absolute; font-weight: bold; font-size: 28px; opacity: 0; transition: opacity 0.2s; }
            .d-menu-btn:hover span { opacity: 0; }
            .d-menu-btn:hover::after { opacity: 1; }

            .d-sidebar-left {
                position: fixed; top: 0; bottom: 0; left: -300px; width: var(--sidebar-width);
                background: rgba(255, 235, 59, 0.98); z-index: 600; display: flex;
                flex-direction: column; padding: 100px 15px 30px 15px;
                transition: left 0.4s ease-in-out; border-right: 2px solid #000; box-sizing: border-box;
            }
            .d-sidebar-left.open { left: 0; }

            .d-nav-item { margin-bottom: 20px; width: 100%; }
            .d-sidebar-left a { display: flex; align-items: center; color: #000; text-decoration: none; font-size: 1.1rem; width: 100%; transition: color 0.3s; }
            .d-sidebar-left a:hover { color: var(--anton-red); }
            .d-nav-label { display: flex; align-items: center; width: 100%; }
            .d-nav-label i.main-icon { width: 30px; text-align: center; margin-right: 10px; }
            .d-arrow-wrapper { margin-left: auto; padding-right: 5px; }
            .d-submenu-indicator { font-size: 0.8rem; transition: transform 0.3s; }
            .d-nav-item:hover .d-submenu-indicator { transform: rotate(180deg); }
            .d-submenu { display: none; flex-direction: column; padding-left: 35px; margin-top: 10px; width: 100%; box-sizing: border-box; }
            .d-nav-item:hover .d-submenu { display: flex; }
            .d-submenu a { font-size: 0.85rem; margin-bottom: 12px; white-space: nowrap; justify-content: flex-start; padding-top: 4px; }
            .d-submenu a i { margin-right: 10px; width: 18px; text-align: center; }
            .d-nav-item-epk { margin-top: auto; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 15px; }
            .d-nav-item-epk a { color: var(--anton-red) !important; font-weight: bold; }

            .d-sidebar-right {
                position: fixed; top: 50%; right: 0; transform: translateY(-50%); width: 50px;
                display: flex; flex-direction: column; align-items: center; gap: 15px;
                z-index: 999; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(3px);
                padding: 25px 0; border-radius: 20px 0 0 20px;
            }
            .d-sidebar-right a { text-decoration: none; }
            .d-sidebar-right a i { color: #000; font-size: 1.2rem; transition: transform 0.4s ease-in-out, color 0.4s ease-in-out; animation: ultraFlowWave 6s linear infinite; }

            @keyframes ultraFlowWave {
                0%           { transform: scale(1);    color: #000; }
                9.33%        { transform: scale(1.55); color: var(--brand-color); }
                23.33%, 100% { transform: scale(1);    color: #000; }
            }

            .d-sidebar-right a:nth-child(1) i  { --brand-color: #f00;               animation-delay: 0.0s;  }
            .d-sidebar-right a:nth-child(2) i  { --brand-color: #25F4EE;            animation-delay: 0.25s; }
            .d-sidebar-right a:nth-child(3) i  { --brand-color: #E1306C;            animation-delay: 0.5s;  }
            .d-sidebar-right a:nth-child(4) i  { --brand-color: #25D366;            animation-delay: 0.75s; }
            .d-sidebar-right a:nth-child(5) i  { --brand-color: #1877F2;            animation-delay: 1.0s;  }
            .d-sidebar-right a:nth-child(6) i  { --brand-color: #1DB954;            animation-delay: 1.25s; }
            .d-sidebar-right a:nth-child(7) i  { --brand-color: var(--apple-gray);  animation-delay: 1.5s;  }
            .d-sidebar-right a:nth-child(8) i  { --brand-color: #f00;               animation-delay: 1.75s; }
            .d-sidebar-right a:nth-child(9) i  { --brand-color: var(--amazon-blue); animation-delay: 2.0s;  }
            .d-sidebar-right:hover a i { animation-play-state: paused !important; transform: scale(1) !important; color: #000 !important; }
            .d-sidebar-right a:hover i { color: var(--brand-color) !important; transform: scale(1.55) !important; }

            main {
                flex: 1;
                padding: 110px 80px 80px 80px;
                max-width: 1200px;
                margin: 0 auto;
                z-index: 10;
                width: 100%;
                box-sizing: border-box;
            }

            .d-footer {
                width: 100%; padding: 15px 0; background: rgba(255,255,255,0.95);
                border-top: 1.5px solid #000; text-align: center; font-size: 0.75rem;
                z-index: 100; position: fixed; bottom: 0; left: 0;
            }
            .d-footer a { color: #000; text-decoration: none; margin: 0 12px; font-weight: bold; transition: all 0.3s ease; }
            .d-footer a:hover { color: var(--anton-yellow) !important; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
        }

        /* ================================================================= */
        /* 2. MOBILE STYLES                                                   */
        /* ================================================================= */
        @media (max-width: 800px) {
            #desktop-wrapper { display: none !important; }

            body {
                height: 100vh; width: 100vw; overflow: hidden !important;
                position: fixed; display: flex; flex-direction: column; touch-action: pan-y;
                overscroll-behavior-x: none;
            }

            #m-bg-fix {
                display: block; position: fixed; top: 0; left: -100%;
                width: 300%; height: 100%; background: url('Background.jpg') no-repeat center center;
                background-size: cover; z-index: -1; will-change: transform;
            }

            .m-header {
                position: fixed; top: 0; width: 100%; height: 80px;
                display: flex; justify-content: center; align-items: center;
                z-index: 1000; background: rgba(255, 255, 255, 0.8);
                backdrop-filter: blur(10px); border-bottom: 2px solid #000;
                transition: transform 0.6s ease-in-out;
            }
            .m-header-logo {
                position: absolute; top: 120%; transform: translateY(-50%);
                max-height: 185px; width: auto;
                filter: brightness(0) saturate(100%) invert(13%) sepia(95%) saturate(7408%) hue-rotate(359deg) brightness(97%) contrast(113%);
            }

            .m-menu-btn {
                position: fixed; top: 18px; left: 15px; z-index: 1500;
                background: #000; width: 45px; height: 45px; border-radius: 5px;
                display: flex; flex-direction: column; align-items: center; justify-content: center;
                gap: 5px; cursor: pointer; border: 2px solid #000;
            }
            .m-menu-btn span { display: block; width: 22px; height: 3px; background: #fff; transition: 0.3s; }
            .m-menu-btn.active { background: var(--anton-yellow); }
            .m-menu-btn.active span { display: none; }
            .m-menu-btn.active::after { content: 'A'; color: #000; font-weight: bold; font-size: 28px; }

            .m-sidebar {
                position: fixed; left: 0; top: -120px; width: 100%; height: 95px;
                background: var(--anton-yellow); z-index: 1100; display: flex;
                flex-direction: row; padding: 0 55px 0 75px; box-sizing: border-box;
                border-bottom: 3px solid #000; justify-content: space-between;
                align-items: center; transition: top 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .m-sidebar.open { top: 0 !important; }

            .m-nav-item { flex: 1; text-align: center; }
            .m-nav-item a { text-decoration: none; color: #000; display: flex; flex-direction: column; align-items: center; }
            .mobile-tag { font-size: 0.55rem; text-transform: uppercase; font-weight: bold; margin-top: 4px; }

            .m-epk-container {
                position: absolute; right: 0; top: 0; height: 100%; width: 45px;
                background: #fff; border-left: 3px solid #000;
                display: flex; align-items: center; justify-content: center;
            }
            .m-epk-text {
                writing-mode: vertical-rl; transform: rotate(180deg);
                font-size: 0.7rem; color: var(--anton-red); font-weight: bold; text-decoration: none;
            }

            .m-content-scroll {
                flex: 1;
                margin-top: 80px;
                margin-bottom: 65px;
                overflow-y: auto;
                overflow-x: hidden;
                padding: 20px 15px;
                -webkit-overflow-scrolling: touch;
                box-sizing: border-box;
            }

            .m-id-button {
                position: fixed; right: 0; bottom: 150px; width: 38px; height: 38px;
                background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(4px);
                border: 2px solid #000; border-right: none; border-radius: 6px 0 0 6px;
                display: flex; align-items: center; justify-content: center;
                z-index: 1300; font-weight: bold; font-size: 0.85rem; color: #000;
                cursor: pointer; transition: transform 0.4s ease-in-out;
                font-family: 'Special Elite', cursive;
            }
            .m-id-button.hidden { transform: translateX(100%); }

            .m-id-panel {
                position: fixed; right: -250px; bottom: 150px; height: 45px; width: 230px;
                background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(8px);
                border: 2px solid #000; border-right: none;
                display: flex; align-items: center; justify-content: center;
                z-index: 1299; transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
                border-radius: 8px 0 0 8px; font-weight: bold; font-size: 0.85rem;
            }
            .m-id-panel.open { right: 0; }
            .m-id-panel a { color: #000; text-decoration: none; margin: 0 8px; text-transform: uppercase; }

            .m-sidebar-right {
                position: fixed; bottom: 0; left: 0; width: 100%; height: 65px;
                display: flex; flex-direction: row; align-items: center;
                z-index: 999; background: rgba(255, 255, 255, 0.7);
                backdrop-filter: blur(8px); border-top: 2px solid #000;
                padding: 0 10px; justify-content: space-evenly;
            }
            .m-sidebar-right a { text-decoration: none; }
            .m-sidebar-right a i { color: #000; font-size: 1.5rem; display: inline-block; animation: ultraFlowWaveMobile 6s linear infinite; }

            @keyframes ultraFlowWaveMobile {
                0%           { transform: scale(1);   color: #000; }
                9.33%        { transform: scale(1.4); color: var(--brand-color); }
                23.33%, 100% { transform: scale(1);   color: #000; }
            }

            .m-sidebar-right a:nth-child(1) i  { --brand-color: #f00;               animation-delay: 0.0s;  }
            .m-sidebar-right a:nth-child(2) i  { --brand-color: #25F4EE;            animation-delay: 0.25s; }
            .m-sidebar-right a:nth-child(3) i  { --brand-color: #E1306C;            animation-delay: 0.5s;  }
            .m-sidebar-right a:nth-child(4) i  { --brand-color: #25D366;            animation-delay: 0.75s; }
            .m-sidebar-right a:nth-child(5) i  { --brand-color: #1877F2;            animation-delay: 1.0s;  }
            .m-sidebar-right a:nth-child(6) i  { --brand-color: #1DB954;            animation-delay: 1.25s; }
            .m-sidebar-right a:nth-child(7) i  { --brand-color: var(--apple-gray);  animation-delay: 1.5s;  }
            .m-sidebar-right a:nth-child(8) i  { --brand-color: #f00;               animation-delay: 1.75s; }
            .m-sidebar-right a:nth-child(9) i  { --brand-color: var(--amazon-blue); animation-delay: 2.0s;  }

            .m-menu-btn  { z-index: 1500; }
            .m-sidebar   { z-index: 1100; }
            .m-sidebar-right { z-index: 999; }
            .m-id-button,
            .m-id-panel  { z-index: 1300; }
        }

        /* ================================================================= */
        /* SHOP STYLES (DESKTOP + MOBILE)                                    */
        /* ================================================================= */

        /* Shop Header Banner */
        .shop-banner {
            background: var(--anton-yellow);
            border: 3px solid #000;
            box-shadow: 6px 6px 0 #000;
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .shop-banner h1 {
            margin: 0;
            font-size: clamp(1.6rem, 3.5vw, 2.2rem);
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #000;
        }

        .shop-banner .cart-icon-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            font-weight: bold;
        }

        .shop-banner .cart-icon-wrap i {
            font-size: 1.8rem;
            color: var(--anton-red);
        }

        /* Category Tabs */
        .shop-cats {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .shop-cat-btn {
            background: rgba(255,255,255,0.9);
            border: 2px solid #000;
            box-shadow: 3px 3px 0 #000;
            border-radius: 30px;
            padding: 7px 18px;
            font-family: 'Special Elite', cursive;
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            color: #000;
        }

        .shop-cat-btn:hover,
        .shop-cat-btn.active {
            background: var(--anton-yellow);
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 #000;
        }

        /* Product Grid */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 22px;
            padding-bottom: 20px;
        }

        @media (max-width: 800px) {
            .shop-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 14px;
            }
        }

        @media (max-width: 420px) {
            .shop-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Product Card */
        .product-card {
            background: rgba(255,255,255,0.96);
            border: 3px solid #000;
            box-shadow: 5px 5px 0 #000;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }

        .product-card:hover {
            transform: translate(-3px, -3px);
            box-shadow: 8px 8px 0 #000;
        }

        .product-img-wrap {
            background: var(--anton-yellow);
            border-bottom: 3px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px 20px;
            min-height: 160px;
            position: relative;
        }

        .product-emoji {
            font-size: 5rem;
            line-height: 1;
            user-select: none;
            transition: transform 0.3s ease;
        }

        .product-card:hover .product-emoji {
            transform: scale(1.12) rotate(-4deg);
        }

        .product-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--anton-red);
            color: #fff;
            font-size: 0.65rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 9px;
            border-radius: 20px;
            border: 2px solid #000;
        }

        .product-info {
            padding: 16px 18px 18px;
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 8px;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #000;
            margin: 0;
        }

        .product-desc {
            font-size: 0.8rem;
            color: #555;
            margin: 0;
            line-height: 1.4;
        }

        /* Color / Size Selects */
        .product-selects {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 4px;
        }

        .product-selects label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            font-weight: bold;
        }

        .product-selects select {
            font-family: 'Special Elite', cursive;
            font-size: 0.8rem;
            padding: 5px 8px;
            border: 2px solid #000;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }

        .product-selects select:focus { outline: none; border-color: var(--anton-red); }

        .product-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 10px;
        }

        .product-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--anton-red);
        }

        /* PayPal Add-to-Cart Button styling */
        .paypal-btn-wrap {
            /* PayPal button injects its own element; we style the wrapper */
        }

        /* Custom Add-to-Cart button fallback look */
        .btn-add-cart {
            background: #000;
            color: var(--anton-yellow);
            border: 2px solid #000;
            border-radius: 8px;
            padding: 9px 16px;
            font-family: 'Special Elite', cursive;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: background 0.2s, color 0.2s, transform 0.15s;
            white-space: nowrap;
        }

        .btn-add-cart:hover {
            background: var(--anton-yellow);
            color: #000;
            transform: scale(1.04);
        }

        .btn-add-cart i { font-size: 1rem; }

        /* ---- Toast ---- */
        #cart-toast {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: #000;
            color: var(--anton-yellow);
            border: 2px solid #000;
            border-radius: 40px;
            padding: 12px 24px;
            font-family: 'Special Elite', cursive;
            font-size: 0.95rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;

    <script>
    /* =================================================================

    const products = [

            emoji: '🍱',

            badge: 'KIDS',
            category: 'kueche',
            options: { Motiv: ['ANTON Classic','ANTON Bunt'] }
        },
        {
            id: 'trinkflasche',
            name: 'Trinkflasche',
            desc: 'Auslaufsichere Edelstahl-Flasche (500 ml) – hält Getränke kalt oder heiß.',
            emoji: '🧃',
            price: 22.99,
            badge: null,
            category: 'kueche',
            options: { Farbe: ['Schwarz','Gelb','Rot'], Größe: ['500 ml','750 ml'] }
        },
        {
            id: 'fruehstuecksbrett',
            name: 'Frühstücksbrett',
            desc: 'Personalisiertes Holzbrett mit ANTON-Gravur – macht jedes Frühstück besonders.',
            emoji: '🪵',
            price: 27.99,
            badge: 'PERSONALISIERBAR',
            category: 'kueche',
            options: { Motiv: ['ANTON Logo','ANTON & Name'] }
        }
    ];

    const categories = [
        { key: 'alle',       label: 'Alle Artikel' },
        { key: 'kleidung',   label: 'Kleidung' },
        { key: 'accessoires',label: 'Accessoires' },
        { key: 'kueche',     label: 'Küche & Kids' }
    ];

    let activeCategory = 'alle';

    /* =================================================================
       RENDER SHOP HTML
    ================================================================= */
    function buildShopHTML() {
        const catBtns = categories.map(c =>
            `<button class="shop-cat-btn${c.key === activeCategory ? ' active' : ''}"
                onclick="filterCat('${c.key}')">${c.label}</button>`
        ).join('');

        const visible = activeCategory === 'alle'
            ? products
            : products.filter(p => p.category === activeCategory);

        const cards = visible.map(p => {
            const badge = p.badge ? `<span class="product-badge">${p.badge}</span>` : '';
            const selects = Object.entries(p.options).map(([label, opts]) => `
                <div>
                    <label>${label}</label>
                    <select id="sel-${p.id}-${label.toLowerCase()}" aria-label="${label} für ${p.name}">
                        ${opts.map(o => `<option value="${o}">${o}</option>`).join('')}
                    </select>
                </div>
            `).join('');

            return `
            <div class="product-card" data-id="${p.id}">
                <div class="product-img-wrap">
                    <span class="product-emoji">${p.emoji}</span>
                    ${badge}
                </div>
                <div class="product-info">
                    <p class="product-name">${p.name}</p>
                    <p class="product-desc">${p.desc}</p>
                    <div class="product-selects">${selects}</div>
                    <div class="product-footer">
                        <span class="product-price">${p.price.toFixed(2).replace('.', ',')} €</span>
                        <button class="btn-add-cart" onclick="addToCart('${p.id}')">
                            <i class="fa-solid fa-cart-plus"></i> In den Warenkorb
                        </button>
                    </div>
                </div>
            </div>`;
        }).join('');

        return `
            <div class="shop-banner">
                <h1><i class="fa-solid fa-cart-shopping" style="color:var(--anton-red);margin-right:12px;"></i>ANTON Shop</h1>
                <div class="cart-icon-wrap">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span>Merchandise & Musik</span>
                </div>
            </div>
            <div class="shop-cats">${catBtns}</div>
            <div class="shop-grid">${cards}</div>
        `;
    }

    function renderShop() {
        const html = buildShopHTML();
        const d = document.getElementById('d-shop-content');
        const m = document.getElementById('m-shop-content');
        if (d) d.innerHTML = html;
        if (m) m.innerHTML = html;
    }

    function filterCat(key) {
        activeCategory = key;
        renderShop();
    }

    /* =================================================================
       LOKALER WARENKORB – Artikel werden im Browser gesammelt.
       Erst beim Checkout-Klick wird alles an PayPal übertragen.
    ================================================================= */
    const PAYPAL_BUSINESS = 'ZTBGBVKBM4U2G';
    const PAYPAL_CURRENCY = 'EUR';
    const PAYPAL_URL      = 'https://www.paypal.com/cgi-bin/webscr';
    const RETURN_URL      = window.location.href;
    const CANCEL_URL      = window.location.href;

    // cart = array of { id, name, emoji, price, variant, qty }
    let cart = JSON.parse(localStorage.getItem('anton_cart') || '[]');

    function saveCart() {
        localStorage.setItem('anton_cart', JSON.stringify(cart));
    }

    /* ---------- ADD TO CART ---------- */
    function addToCart(productId) {
        const p = products.find(x => x.id === productId);
        if (!p) return;

        // read selected options
        const variantParts = Object.entries(p.options).map(([label]) => {
            const sel = [...document.querySelectorAll(`[id="sel-${p.id}-${label.toLowerCase()}"]`)][0];
            return sel ? `${label}: ${sel.value}` : null;
        }).filter(Boolean);
        const variant = variantParts.join(' | ');

        // check if same product+variant already in cart
        const key = productId + '|' + variant;
        const existing = cart.find(i => i.key === key);
        if (existing) {
            existing.qty++;
        } else {
            cart.push({ key, id: productId, name: p.name, emoji: p.emoji, price: p.price, variant, qty: 1 });
        }

        saveCart();
        updateCartUI();
        showToast(`${p.emoji} ${p.name} wurde hinzugefügt!`);
        flashCartBtn();
    }

    /* ---------- CHANGE QTY ---------- */
    function changeQty(key, delta) {
        const item = cart.find(i => i.key === key);
        if (!item) return;
        item.qty += delta;
        if (item.qty <= 0) cart = cart.filter(i => i.key !== key);
        saveCart();
        updateCartUI();
    }

    /* ---------- REMOVE ---------- */
    function removeItem(key) {
        cart = cart.filter(i => i.key !== key);
        saveCart();
        updateCartUI();
    }

    /* ---------- CLEAR ---------- */
    function clearCart() {
        cart = [];
        saveCart();
        updateCartUI();
    }

    /* ---------- UI UPDATE ---------- */
    function updateCartUI() {
        const totalQty   = cart.reduce((s, i) => s + i.qty, 0);
        const totalPrice = cart.reduce((s, i) => s + i.price * i.qty, 0);

        // badge + label
        const badge = document.getElementById('cart-badge');
        const label = document.getElementById('cart-label');
        if (badge) {
            badge.textContent = totalQty;
            badge.style.display = totalQty > 0 ? 'flex' : 'none';
        }
        if (label) label.textContent = 'Warenkorb';

        // drawer items
        const itemsEl = document.getElementById('cart-drawer-items');
        const footerEl = document.getElementById('cart-drawer-footer');
        if (!itemsEl) return;

        if (cart.length === 0) {
            itemsEl.innerHTML = `<div class="cart-empty"><i class="fa-solid fa-cart-shopping"></i>Dein Warenkorb ist noch leer.</div>`;
            if (footerEl) footerEl.innerHTML = '';
            return;
        }

        itemsEl.innerHTML = cart.map(item => `
            <div class="cart-item">
                <span class="cart-item-emoji">${item.emoji}</span>
                <div class="cart-item-info">
                    <div class="cart-item-name">${item.name}</div>
                    ${item.variant ? `<div class="cart-item-variant">${item.variant}</div>` : ''}
                    <div class="cart-item-price">${(item.price * item.qty).toFixed(2).replace('.', ',')} €</div>
                </div>
                <div class="cart-item-qty">
                    <button class="qty-btn" onclick="changeQty('${escKey(item.key)}', -1)">−</button>
                    <span class="qty-num">${item.qty}</span>
                    <button class="qty-btn" onclick="changeQty('${escKey(item.key)}', 1)">+</button>
                </div>
                <button class="cart-item-del" onclick="removeItem('${escKey(item.key)}')"><i class="fa-solid fa-trash"></i></button>
            </div>
        `).join('');

        if (footerEl) {
            footerEl.innerHTML = `
                <div class="cart-total-row">
                    <span>Gesamt</span>
                    <span class="cart-total-price">${totalPrice.toFixed(2).replace('.', ',')} €</span>
                </div>
                <button class="btn-checkout" onclick="checkoutPayPal()">
                    <i class="fa-brands fa-paypal"></i> Jetzt mit PayPal bezahlen
                </button>
                <button class="btn-cart-clear" onclick="clearCart()">Warenkorb leeren</button>
            `;
        }
    }

    function escKey(key) {
        return key.replace(/'/g, "\\'");
    }

    /* ---------- DRAWER ---------- */
    function openCartDrawer() {
        document.getElementById('cart-drawer').classList.add('open');
        document.getElementById('cart-overlay').classList.add('open');
        updateCartUI();
    }

    function closeCartDrawer() {
        document.getElementById('cart-drawer').classList.remove('open');
        document.getElementById('cart-overlay').classList.remove('open');
    }

    /* ---------- TOAST ---------- */
    let toastTimer;
    function showToast(msg) {
        const t = document.getElementById('cart-toast');
        const txt = document.getElementById('toast-text');
        if (!t) return;
        txt.textContent = msg;
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
    }

    /* ---------- FLASH CART BTN ---------- */
    function flashCartBtn() {
        const btn = document.getElementById('cart-float-btn');
        if (!btn) return;
        btn.style.transform  = 'scale(1.18) translate(-2px,-2px)';
        btn.style.background = '#000';
        btn.style.color      = '#fff';
        setTimeout(() => {
            btn.style.transform  = '';
            btn.style.background = '';
            btn.style.color      = '';
        }, 380);
    }

    /* ---------- PAYPAL CHECKOUT ---------- */
    // Alle Artikel werden als item_name_N / amount_N / quantity_N übergeben.
    // PayPal Payments Standard unterstützt bis zu 999 Positionen via _cart.
    function checkoutPayPal() {
        if (cart.length === 0) return;

        const form = document.createElement('form');
        form.method = 'post';
        form.action = PAYPAL_URL;
        form.target = '_blank';

        function field(name, value) {
            const inp = document.createElement('input');
            inp.type = 'hidden';
            inp.name = name;
            inp.value = value;
            form.appendChild(inp);
        }

        field('cmd',           '_cart');
        field('upload',        '1');           // upload=1 → alle Items auf einmal
        field('business',      PAYPAL_BUSINESS);
        field('currency_code', PAYPAL_CURRENCY);
        field('lc',            'DE');
        field('return',        RETURN_URL);
        field('cancel_return', CANCEL_URL);

        cart.forEach((item, idx) => {
            const n = idx + 1;
            field(`item_name_${n}`, `ANTON – ${item.name}${item.variant ? ' (' + item.variant + ')' : ''}`);
            field(`amount_${n}`,    item.price.toFixed(2));
            field(`quantity_${n}`,  item.qty);
        });

        document.body.appendChild(form);
        form.submit();
        document.body.removeChild(form);
    }

    /* =================================================================
       DESKTOP MENU LOGIC
    ================================================================= */
    let dSidebarTimeout;
    const dSidebar = document.getElementById('d-sidebar');

    function resetDSidebarTimer() {
        clearTimeout(dSidebarTimeout);
        if (dSidebar && dSidebar.classList.contains('open')) {
            dSidebarTimeout = setTimeout(() => dSidebar.classList.remove('open'), 5000);
        }
    }

    function toggleDesktopMenu() {
        if (dSidebar) {
            dSidebar.classList.toggle('open');
            if (dSidebar.classList.contains('open')) resetDSidebarTimer();
        }
    }

    if (dSidebar) {
        dSidebar.addEventListener('mousemove', resetDSidebarTimer);
        dSidebar.addEventListener('click', resetDSidebarTimer);
    }

    document.addEventListener('click', function(e) {
        if (window.innerWidth > 800) {
            const btn = document.querySelector('.d-menu-btn');
            if (dSidebar && !dSidebar.contains(e.target) && btn && !btn.contains(e.target) && dSidebar.classList.contains('open')) {
                dSidebar.classList.remove('open');
                clearTimeout(dSidebarTimeout);
            }
        }
    });

    /* =================================================================
       MOBILE LOGIC
    ================================================================= */
    const mSidebar = document.getElementById('m-sidebar');
    const mMenuBtn = document.getElementById('m-menu-trigger');
    const mIdBtn   = document.getElementById('m-id-btn');
    const mIdPanel = document.getElementById('m-id-panel');
    const mBg      = document.getElementById('m-bg-fix');
    let mMenuTimeout, mIdTimeout;

    function mCloseAllMenus() {
        if (mSidebar)  mSidebar.classList.remove('open');
        if (mMenuBtn)  mMenuBtn.classList.remove('active');
        if (mMenuTimeout) clearTimeout(mMenuTimeout);
        if (mIdPanel)  mIdPanel.classList.remove('open');
        if (mIdBtn)    mIdBtn.classList.remove('hidden');
        if (mIdTimeout) clearTimeout(mIdTimeout);
    }

    function mToggleMenu(e) {
        e.stopPropagation();
        if (mSidebar.classList.contains('open')) {
            mCloseAllMenus();
        } else {
            mCloseAllMenus();
            mSidebar.classList.add('open');
            mMenuBtn.classList.add('active');
            mMenuTimeout = setTimeout(mCloseAllMenus, 5000);
        }
    }

    function mOpenIDMenu(e) {
        e.stopPropagation();
        mCloseAllMenus();
        if (mIdBtn)   mIdBtn.classList.add('hidden');
        if (mIdPanel) mIdPanel.classList.add('open');
        mIdTimeout = setTimeout(mCloseAllMenus, 5000);
    }

    let touchStartX = 0, touchStartY = 0, currentTranslateX = 0;

    document.addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.addEventListener('touchmove', e => {
        if (window.innerWidth <= 800) {
            const diffX = e.touches[0].clientX - touchStartX;
            const diffY = e.touches[0].clientY - touchStartY;
            if (Math.abs(diffX) > 10 || Math.abs(diffY) > 10) {
                if (mSidebar && !mSidebar.contains(e.target)) mCloseAllMenus();
            }
            if (Math.abs(diffX) > Math.abs(diffY)) {
                let newX = currentTranslateX + diffX;
                const limit = window.innerWidth;
                if (newX >  limit) newX =  limit;
                if (newX < -limit) newX = -limit;
                if (mBg) mBg.style.transform = `translateX(${newX}px)`;
            }
        }
    }, { passive: true });

    document.addEventListener('touchend', () => {
        if (window.innerWidth <= 800 && mBg) {
            const matrix = new WebKitCSSMatrix(window.getComputedStyle(mBg).transform);
            currentTranslateX = matrix.m41;
        }
    }, { passive: true });

    document.addEventListener('click', e => {
        if (window.innerWidth <= 800) {
            if (mSidebar && !mSidebar.contains(e.target) &&
                mMenuBtn && !mMenuBtn.contains(e.target) &&
                mIdPanel && !mIdPanel.contains(e.target) &&
                mIdBtn   && !mIdBtn.contains(e.target)) mCloseAllMenus();
        }
    });

    setTimeout(() => {
        const mh = document.getElementById('m-header-main');
        if (mh && window.innerWidth <= 800) mh.style.transform = 'translateY(-100%)';
    }, 3000);

    /* =================================================================
       INIT
    ================================================================= */
    renderShop();
    updateCartUI();
    </script>
</body>
</html>
