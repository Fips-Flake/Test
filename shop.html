<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ANTON | SHOP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap&subset=latin-ext" rel="stylesheet">
    <style>
        :root {
            --anton-red: #ff0000;
            --anton-yellow: #ffeb3b;
            --sidebar-width: 240px;
            --apple-gray: #A2AAAD;
            --amazon-blue: #00A8E1;
        }

        html, body {
            margin: 0; padding: 0;
            background-color: transparent;
            font-family: 'Special Elite', cursive;
            height: 100%; width: 100%;
        }

        /* ================================================================= */
        /* DESKTOP                                                            */
        /* ================================================================= */
        @media (min-width: 801px) {
            #mobile-wrapper { display: none !important; }

            html {
                background: url('Background.jpg') no-repeat center center fixed;
                background-size: cover;
            }
            body {
                background: transparent;
                overflow-x: hidden;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }

            .d-header { position: fixed; top: 0; width: 100%; height: 80px; display: flex; justify-content: center; align-items: center; z-index: 100; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border-bottom: 2px solid #000; }
            .d-header-logo { max-height: 285px; width: auto; object-fit: contain; filter: brightness(0) saturate(100%) invert(13%) sepia(95%) saturate(7408%) hue-rotate(359deg) brightness(97%) contrast(113%); transform: translateY(82px); }

            .d-menu-btn { position: fixed; top: 18px; left: 20px; font-size: 24px; cursor: pointer; z-index: 210; background: #000; color: #fff; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 5px; transition: all 0.3s ease; border: 2px solid #000; overflow: hidden; }
            .d-menu-btn:hover { background: var(--anton-yellow); color: #000; }
            .d-menu-btn span { transition: opacity 0.2s; }
            .d-menu-btn::after { content: 'A'; position: absolute; font-weight: bold; font-size: 28px; opacity: 0; transition: opacity 0.2s; }
            .d-menu-btn:hover span { opacity: 0; }
            .d-menu-btn:hover::after { opacity: 1; }

            .d-sidebar-left { position: fixed; top: 0; bottom: 0; left: -300px; width: var(--sidebar-width); background: rgba(255,235,59,0.98); z-index: 200; display: flex; flex-direction: column; padding: 100px 15px 30px 15px; transition: left 0.4s ease-in-out; border-right: 2px solid #000; box-sizing: border-box; }
            .d-sidebar-left.open { left: 0; }
            .d-nav-item { margin-bottom: 20px; width: 100%; }
            .d-sidebar-left a { display: flex; align-items: center; color: #000; text-decoration: none; font-size: 1.1rem; width: 100%; transition: color 0.3s; }
            .d-sidebar-left a:hover { color: var(--anton-red); }
            .d-nav-label { display: flex; align-items: center; width: 100%; }
            .d-nav-label i.main-icon { width: 30px; text-align: center; margin-right: 10px; }
            .d-arrow-wrapper { margin-left: auto; padding-right: 5px; }
            .d-submenu-indicator { font-size: 0.8rem; transition: transform 0.3s; }
            .d-nav-item:hover .d-submenu-indicator { transform: rotate(180deg); }
            .d-submenu { display: none; flex-direction: column; padding-left: 35px; margin-top: 10px; width: 100%; box-sizing: border-box; }
            .d-nav-item:hover .d-submenu { display: flex; }
            .d-submenu a { font-size: 0.85rem; margin-bottom: 12px; white-space: nowrap; justify-content: flex-start; padding-top: 4px; }
            .d-submenu a i { margin-right: 10px; width: 18px; text-align: center; }
            .d-nav-item-epk { margin-top: auto; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 15px; }
            .d-nav-item-epk a { color: var(--anton-red) !important; font-weight: bold; }

            .d-sidebar-right { position: fixed; top: 50%; right: 0; transform: translateY(-50%); width: 50px; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 999; background: rgba(255,255,255,0.2); backdrop-filter: blur(3px); padding: 25px 0; border-radius: 20px 0 0 20px; }
            .d-sidebar-right a { text-decoration: none; }
            .d-sidebar-right a i { color: #000; font-size: 1.2rem; animation: ultraFlowWave 6s linear infinite; }
            @keyframes ultraFlowWave { 0% { transform: scale(1); color: #000; } 9.33% { transform: scale(1.55); color: var(--brand-color); } 23.33%, 100% { transform: scale(1); color: #000; } }
            .d-sidebar-right a:nth-child(1) i { --brand-color: #f00; animation-delay: 0.0s; }
            .d-sidebar-right a:nth-child(2) i { --brand-color: #25F4EE; animation-delay: 0.25s; }
            .d-sidebar-right a:nth-child(3) i { --brand-color: #E1306C; animation-delay: 0.5s; }
            .d-sidebar-right a:nth-child(4) i { --brand-color: #25D366; animation-delay: 0.75s; }
            .d-sidebar-right a:nth-child(5) i { --brand-color: #1877F2; animation-delay: 1.0s; }
            .d-sidebar-right a:nth-child(6) i { --brand-color: #1DB954; animation-delay: 1.25s; }
            .d-sidebar-right a:nth-child(7) i { --brand-color: var(--apple-gray); animation-delay: 1.5s; }
            .d-sidebar-right a:nth-child(8) i { --brand-color: #f00; animation-delay: 1.75s; }
            .d-sidebar-right a:nth-child(9) i { --brand-color: var(--amazon-blue); animation-delay: 2.0s; }
            .d-sidebar-right:hover a i { animation-play-state: paused !important; transform: scale(1) !important; color: #000 !important; }
            .d-sidebar-right a:hover i { color: var(--brand-color) !important; transform: scale(1.55) !important; }

            main {
                flex: 1;
                padding: 95px 60px 30px 60px;
                z-index: 5;
                width: 100%;
                box-sizing: border-box;
            }

            /* Footer transparent, kein weißer Balken */
            .d-footer { width: 100%; padding: 12px 0; background: rgba(255,255,255,0.75); backdrop-filter: blur(10px); border-top: 1.5px solid #000; text-align: center; font-size: 0.75rem; z-index: 100; position: fixed; bottom: 0; left: 0; }
            .d-footer a { color: #000; text-decoration: none; margin: 0 12px; font-weight: bold; transition: all 0.3s ease; }
            .d-footer a:hover { color: var(--anton-yellow) !important; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
        }

        /* ================================================================= */
        /* MOBILE                                                             */
        /* ================================================================= */
        @media (max-width: 800px), (orientation: landscape) and (max-height: 500px) {
            #desktop-wrapper { display: none !important; }
            #mobile-wrapper  { display: block !important; }

            html {
                background: url('Background.jpg') no-repeat center center fixed;
                background-size: cover;
            }
            body { height: 100vh; width: 100vw; overflow: hidden !important; position: fixed; display: flex; flex-direction: column; background: transparent; }

            .m-header { position: fixed; top: 0; width: 100%; height: 80px; display: flex; justify-content: center; align-items: center; z-index: 1000; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border-bottom: 2px solid #000; transition: transform 0.6s ease-in-out; }
            .m-header-logo { position: absolute; top: 120%; transform: translateY(-50%); max-height: 185px; width: auto; filter: brightness(0) saturate(100%) invert(13%) sepia(95%) saturate(7408%) hue-rotate(359deg) brightness(97%) contrast(113%); }

            .m-menu-btn { position: fixed; top: 18px; left: 15px; z-index: 1500; background: #000; width: 45px; height: 45px; border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; border: 2px solid #000; }
            .m-menu-btn span { display: block; width: 22px; height: 3px; background: #fff; transition: 0.3s; }
            .m-menu-btn.active { background: var(--anton-yellow); }
            .m-menu-btn.active span { display: none; }
            .m-menu-btn.active::after { content: 'A'; color: #000; font-weight: bold; font-size: 28px; }

            .m-sidebar { position: fixed; left: 0; top: -120px; width: 100%; height: 95px; background: var(--anton-yellow); z-index: 1100; display: flex; flex-direction: row; padding: 0 55px 0 75px; box-sizing: border-box; border-bottom: 3px solid #000; justify-content: space-between; align-items: center; transition: top 0.5s cubic-bezier(0.4,0,0.2,1); }
            .m-sidebar.open { top: 0 !important; }
            .m-nav-item { flex: 1; text-align: center; }
            .m-nav-item a { text-decoration: none; color: #000; display: flex; flex-direction: column; align-items: center; }
            .mobile-tag { font-size: 0.55rem; text-transform: uppercase; font-weight: bold; margin-top: 4px; }
            .m-epk-container { position: absolute; right: 0; top: 0; height: 100%; width: 45px; background: #fff; border-left: 3px solid #000; display: flex; align-items: center; justify-content: center; }
            .m-epk-text { writing-mode: vertical-rl; transform: rotate(180deg); font-size: 0.7rem; color: var(--anton-red); font-weight: bold; text-decoration: none; }

            .m-content-scroll { flex: 1; margin-top: 80px; margin-bottom: 65px; overflow-y: auto; overflow-x: hidden; padding: 12px 10px; -webkit-overflow-scrolling: touch; box-sizing: border-box; }

            .m-id-button { position: fixed; right: 0; bottom: 150px; width: 38px; height: 38px; background: rgba(255,255,255,0.4); backdrop-filter: blur(4px); border: 2px solid #000; border-right: none; border-radius: 6px 0 0 6px; display: flex; align-items: center; justify-content: center; z-index: 1300; font-weight: bold; font-size: 0.85rem; color: #000; cursor: pointer; transition: transform 0.4s ease-in-out; font-family: 'Special Elite', cursive; }
            .m-id-button.hidden { transform: translateX(100%); }
            .m-id-panel { position: fixed; right: -250px; bottom: 150px; height: 45px; width: 230px; background: rgba(255,255,255,0.7); backdrop-filter: blur(8px); border: 2px solid #000; border-right: none; display: flex; align-items: center; justify-content: center; z-index: 1299; transition: right 0.5s cubic-bezier(0.4,0,0.2,1); border-radius: 8px 0 0 8px; font-weight: bold; font-size: 0.85rem; }
            .m-id-panel.open { right: 0; }
            .m-id-panel a { color: #000; text-decoration: none; margin: 0 8px; text-transform: uppercase; }

            .m-sidebar-right { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; display: flex; flex-direction: row; align-items: center; z-index: 999; background: rgba(255,255,255,0.7); backdrop-filter: blur(8px); border-top: 2px solid #000; padding: 0 10px; justify-content: space-evenly; }
            .m-sidebar-right a { text-decoration: none; }
            .m-sidebar-right a i { color: #000; font-size: 1.5rem; display: inline-block; animation: ultraFlowWaveMobile 6s linear infinite; }
            @keyframes ultraFlowWaveMobile { 0% { transform: scale(1); color: #000; } 9.33% { transform: scale(1.4); color: var(--brand-color); } 23.33%, 100% { transform: scale(1); color: #000; } }
            .m-sidebar-right a:nth-child(1) i { --brand-color: #f00; animation-delay: 0.0s; }
            .m-sidebar-right a:nth-child(2) i { --brand-color: #25F4EE; animation-delay: 0.25s; }
            .m-sidebar-right a:nth-child(3) i { --brand-color: #E1306C; animation-delay: 0.5s; }
            .m-sidebar-right a:nth-child(4) i { --brand-color: #25D366; animation-delay: 0.75s; }
            .m-sidebar-right a:nth-child(5) i { --brand-color: #1877F2; animation-delay: 1.0s; }
            .m-sidebar-right a:nth-child(6) i { --brand-color: #1DB954; animation-delay: 1.25s; }
            .m-sidebar-right a:nth-child(7) i { --brand-color: var(--apple-gray); animation-delay: 1.5s; }
            .m-sidebar-right a:nth-child(8) i { --brand-color: #f00; animation-delay: 1.75s; }
            .m-sidebar-right a:nth-child(9) i { --brand-color: var(--amazon-blue); animation-delay: 2.0s; }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            #mobile-wrapper .m-header { height: 60px; }
            #mobile-wrapper .m-header-logo { top: 145%; }
            #mobile-wrapper .m-menu-btn { top: 8px; left: 12px; width: 38px; height: 38px; }
            #mobile-wrapper .m-sidebar { top: 0 !important; left: -220px !important; width: 200px !important; height: 100% !important; flex-direction: column !important; justify-content: flex-start !important; align-items: flex-start !important; padding: 80px 15px 20px 15px !important; border-bottom: none !important; border-right: 3px solid #000 !important; box-sizing: border-box !important; transition: left 0.5s cubic-bezier(0.4,0,0.2,1) !important; }
            #mobile-wrapper .m-sidebar.open { left: 0 !important; top: 0 !important; }
            #mobile-wrapper .m-nav-item { flex: none !important; width: 100%; text-align: left; margin-bottom: 16px; }
            #mobile-wrapper .m-nav-item a { flex-direction: row !important; gap: 10px; font-size: 0.85rem; }
            #mobile-wrapper .m-nav-item a i { font-size: 1rem; width: 22px; text-align: center; }
            #mobile-wrapper .mobile-tag { font-size: 0.72rem; writing-mode: horizontal-tb !important; transform: none !important; margin-top: 0; }
            #mobile-wrapper .m-epk-container { position: static !important; width: 100% !important; height: auto !important; background: transparent !important; border-left: none !important; border-top: 1px solid rgba(0,0,0,0.15) !important; padding-top: 12px !important; margin-top: auto !important; justify-content: flex-start !important; }
            #mobile-wrapper .m-epk-text { writing-mode: horizontal-tb !important; transform: none !important; font-size: 0.78rem; }
            #mobile-wrapper .m-content-scroll { margin-top: 65px !important; margin-bottom: 0 !important; padding-right: 56px !important; }
            #mobile-wrapper .m-sidebar-right { position: fixed !important; top: 0 !important; bottom: 0 !important; left: auto !important; right: 0 !important; width: 46px !important; height: 100% !important; flex-direction: column !important; border-top: none !important; border-left: 2px solid #000 !important; border-radius: 0 !important; padding: 0 !important; gap: 0 !important; justify-content: space-evenly !important; background: rgba(255,255,255,0.2) !important; backdrop-filter: blur(3px) !important; }
            #mobile-wrapper .m-sidebar-right a i { font-size: 1.3rem !important; }
            #mobile-wrapper .m-id-button { display: none !important; }
            #mobile-wrapper .m-id-panel { position: fixed !important; bottom: -4px !important; left: 50% !important; right: auto !important; transform: translateX(calc(-50% - 23px)) !important; width: 260px !important; height: 38px !important; border-radius: 10px 10px 0 0 !important; border: 2px solid #000 !important; background: rgba(255,255,255,0.35) !important; backdrop-filter: blur(8px) !important; font-size: 0.75rem !important; opacity: 1 !important; overflow: hidden !important; }
        }

        /* ================================================================= */
        /* SHOP LAYOUT                                                        */
        /* ================================================================= */

        .shop-outer {
            display: flex;
            gap: 18px;
            align-items: flex-start;
            width: 100%;
        }

        /* ── Produkt-Bereich (links) ── */
        .shop-main { flex: 1; min-width: 0; }

        /* ── Hero: weiß/transparent, untere 20% per clip abgeschnitten ── */
        .shop-hero {
            position: relative;
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(10px);
            border: 3px solid #000;
            box-shadow: 6px 6px 0 rgba(0,0,0,0.6);
            border-radius: 18px 18px 0 0;
            overflow: hidden;
            /* Total-Höhe 200px, aber nur 80% sichtbar = 160px effektiv sichtbar */
            height: 200px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            padding: 0 32px;
            /* Clip bottom 20% */
            clip-path: inset(0 0 20% 0 round 18px 18px 0 0);
        }
        .shop-hero-text { display: flex; flex-direction: column; justify-content: center; }
        .shop-hero-tag {
            background: var(--anton-red); color: #fff;
            font-size: 0.58rem; text-transform: uppercase; letter-spacing: 2px;
            padding: 3px 10px; border-radius: 20px; border: 2px solid #000;
            display: inline-block; margin-bottom: 7px; width: fit-content;
        }
        .shop-hero-title {
            font-size: clamp(1.3rem, 2.8vw, 2rem); color: #000;
            text-transform: uppercase; letter-spacing: 3px;
            margin: 0 0 5px 0; line-height: 1.1;
        }
        .shop-hero-sub { font-size: 0.75rem; color: #555; margin: 0; }
        .shop-hero-emojis {
            position: absolute; right: 28px; top: 40%;
            transform: translateY(-50%);
            display: flex; gap: 8px; font-size: 2.6rem;
        }
        .shop-hero-emojis span { display: inline-block; animation: heroFloat 3s ease-in-out infinite; }
        .shop-hero-emojis span:nth-child(2) { animation-delay: 0.4s; }
        .shop-hero-emojis span:nth-child(3) { animation-delay: 0.8s; }
        @keyframes heroFloat { 0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);} }

        /* ── Produkt-Grid: max 4 Spalten ── */
        .shop-bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            padding-bottom: 50px;
        }

        @media (min-width: 801px) and (max-width: 1150px) {
            .shop-bento-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 801px) and (max-width: 900px) {
            .shop-bento-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .product-card {
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(8px);
            border: 3px solid #000;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.6);
            border-radius: 16px;
            overflow: hidden;
            display: flex; flex-direction: column;
            transition: transform 0.22s ease, box-shadow 0.22s ease;
            cursor: pointer;
        }
        .product-card:hover { transform: translate(-3px,-3px); box-shadow: 8px 8px 0 rgba(0,0,0,0.7); }

        /* Oberer Teil: weiß/transparent */
        .product-img-wrap {
            background: rgba(255,255,255,0.55);
            border-bottom: 3px solid #000;
            display: flex; align-items: center; justify-content: center;
            padding: 18px 14px; min-height: 110px; position: relative;
        }
        .product-emoji { font-size: 3.2rem; line-height: 1; user-select: none; transition: transform 0.3s ease; }
        .product-card:hover .product-emoji { transform: scale(1.12) rotate(-4deg); }

        .product-badge {
            position: absolute; top: 8px; right: 8px;
            background: var(--anton-red); color: #fff;
            font-size: 0.52rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
            padding: 2px 7px; border-radius: 20px; border: 2px solid #000;
        }

        /* Unterer Teil: gelb */
        .product-info {
            padding: 10px 12px 12px;
            display: flex; flex-direction: column; flex: 1; gap: 4px;
            background: var(--anton-yellow);
        }
        .product-name { font-size: 0.85rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #000; margin: 0; }
        .product-desc { font-size: 0.66rem; color: #444; margin: 0; line-height: 1.35; }
        .product-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 8px; }
        .product-price { font-size: 1rem; font-weight: bold; color: var(--anton-red); }

        .btn-add-cart {
            background: #000; color: var(--anton-yellow);
            border: 2px solid #000; border-radius: 8px; padding: 5px 10px;
            font-family: 'Special Elite', cursive; font-size: 0.62rem;
            text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; gap: 4px;
            transition: background 0.2s, color 0.2s; white-space: nowrap; cursor: pointer;
        }
        .btn-add-cart:hover { background: var(--anton-red); color: #fff; }
        .btn-add-cart i { font-size: 0.72rem; }

        /* ── Warenkorb-Box (rechts) ── */
        .cart-box {
            flex-shrink: 0;
            width: 210px;
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(10px);
            border: 3px solid #000;
            box-shadow: 6px 6px 0 rgba(0,0,0,0.6);
            border-radius: 18px;
            overflow: hidden;
            display: flex; flex-direction: column;
            position: sticky;
            top: 100px;
            max-height: calc(100vh - 130px);
        }

        .cart-box-header {
            background: var(--anton-yellow);
            border-bottom: 3px solid #000;
            padding: 13px 14px;
            font-size: 0.78rem;
            text-transform: uppercase; letter-spacing: 1px; font-weight: bold;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .cart-box-header-left { display: flex; align-items: center; gap: 7px; }
        .cart-box-header i { color: var(--anton-red); }
        .cart-badge-box {
            background: var(--anton-red); color: #fff;
            border-radius: 50%; width: 18px; height: 18px;
            font-size: 0.62rem;
            display: none; align-items: center; justify-content: center;
            border: 2px solid #000;
        }

        .cart-box-items {
            flex: 1; overflow-y: auto;
            padding: 10px;
            display: flex; flex-direction: column; gap: 8px;
            min-height: 60px;
        }
        .cart-box-items::-webkit-scrollbar { width: 4px; }
        .cart-box-items::-webkit-scrollbar-track { background: transparent; }
        .cart-box-items::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 2px; }

        .cart-empty-msg { text-align: center; color: #aaa; font-size: 0.72rem; padding: 16px 0; }
        .cart-empty-msg i { font-size: 1.6rem; display: block; margin-bottom: 6px; color: #ddd; }

        .cart-item-row {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.7);
            border: 2px solid #000; border-radius: 10px;
            padding: 7px 8px;
        }
        .ci-emoji { font-size: 1.4rem; flex-shrink: 0; }
        .ci-info { flex: 1; min-width: 0; }
        .ci-name { font-size: 0.66rem; font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ci-price { font-size: 0.62rem; color: var(--anton-red); font-weight: bold; }
        .ci-qty { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
        .ci-qty-btn { background: #000; color: #fff; border: none; border-radius: 4px; width: 18px; height: 18px; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: 'Special Elite', cursive; transition: background 0.15s; padding: 0; line-height: 1; }
        .ci-qty-btn:hover { background: var(--anton-red); }
        .ci-qty-num { font-size: 0.72rem; font-weight: bold; min-width: 12px; text-align: center; }
        .ci-del { background: none; border: none; color: #ccc; font-size: 0.75rem; cursor: pointer; padding: 2px; transition: color 0.2s; }

        .cart-box-footer {
            padding: 10px; border-top: 3px solid #000;
            background: rgba(255,255,255,0.5); flex-shrink: 0;
        }
        .cart-total-row {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.78rem; font-weight: bold; text-transform: uppercase;
            margin-bottom: 8px; letter-spacing: 0.5px;
        }
        .cart-total-price { color: var(--anton-red); font-size: 0.95rem; }

        .btn-paypal {
            width: 100%; background: #0070ba; color: #fff;
            border: 2px solid #000; border-radius: 10px; padding: 10px 6px;
            font-family: 'Special Elite', cursive; font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: background 0.2s, transform 0.15s; box-shadow: 3px 3px 0 #000;
        }
        .btn-paypal:hover { background: #005ea6; transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #000; }
        .btn-paypal i { font-size: 0.9rem; }
        .btn-cart-clear { width: 100%; margin-top: 5px; background: none; border: none; font-family: 'Special Elite', cursive; font-size: 0.65rem; color: #aaa; cursor: pointer; text-decoration: underline; text-align: center; transition: color 0.2s; }
        .btn-cart-clear:hover { color: var(--anton-red); }

        /* ── TOAST ── */
        #cart-toast {
            position: fixed; top: 90px; left: 50%;
            transform: translateX(-50%) translateY(-14px);
            background: #000; color: var(--anton-yellow);
            border: 2px solid #000; border-radius: 40px; padding: 9px 18px;
            font-family: 'Special Elite', cursive; font-size: 0.84rem; font-weight: bold;
            display: flex; align-items: center; gap: 8px;
            z-index: 3000; opacity: 0; pointer-events: none;
            transition: opacity 0.28s, transform 0.28s;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.25); white-space: nowrap;
        }
        #cart-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #cart-toast i { color: #00c853; }

        /* ── Mobile ── */
        @media (max-width: 800px) {
            .shop-outer { flex-direction: column; gap: 12px; }
            .cart-box { width: 100%; position: static; max-height: 280px; }

<script>
/* =================================================================
   PRODUKTE
================================================================= */
const products = [
    { id:'cap',          name:'Cap',              desc:'Snapback mit ANTON-Logo.',                emoji:'🧢', price:24.99, badge:'NEU',             page:'shop-cap.html' },
    { id:'tshirt',       name:'T-Shirt',          desc:'Baumwoll-Shirt mit ANTON-Frontprint.',    emoji:'👕', price:29.99, badge:null,              page:'shop-tshirt.html' },
    { id:'hoodie',       name:'Hoodie',           desc:'Kapuzenpulli für Konzerte & Ausflüge.',   emoji:'🧥', price:49.99, badge:'BELIEBT',         page:'shop-hoodie.html' },
    { id:'sweater',      name:'Sweatshirt',       desc:'Crewneck mit ANTON-Print auf Rücken.',    emoji:'🌟', price:39.99, badge:null,              page:'shop-sweatshirt.html' },
    { id:'schluessel',   name:'Schlüsselanhänger',desc:'Metall-Anhänger mit ANTON-Logo.',         emoji:'🔑', price:9.99,  badge:null,              page:'shop-schluessel.html' },
    { id:'sticker',      name:'Sticker-Set',      desc:'10 wetterfeste ANTON-Sticker.',           emoji:'🎨', price:6.99,  badge:'FAN-FAVE',        page:'shop-sticker.html' },
    { id:'poster',       name:'Poster A2',        desc:'Hochwertiger ANTON-Kunstdruck.',          emoji:'🖼️', price:14.99, badge:null,              page:'shop-poster.html' },
    { id:'armband',      name:'Armband',          desc:'Silikon-Konzertband im ANTON-Look.',      emoji:'📿', price:4.99,  badge:'KONZERT',         page:'shop-armband.html' },
    { id:'brotdose',     name:'Brotdose',         desc:'BPA-freie Lunchbox mit ANTON-Design.',    emoji:'🍱', price:18.99, badge:'KIDS',            page:'shop-brotdose.html' },
    { id:'trinkflasche', name:'Trinkflasche',     desc:'Edelstahl – hält kalt & heiß.',           emoji:'🧃', price:22.99, badge:null,              page:'shop-trinkflasche.html' },
    { id:'brett',        name:'Frühstücksbrett',  desc:'Holzbrett mit ANTON-Gravur.',             emoji:'🪵', price:27.99, badge:'PERSONALIS.',     page:'shop-brett.html' },
    { id:'tasse',        name:'Tasse',            desc:'Keramik-Tasse mit ANTON-Logo.',           emoji:'☕', price:16.99, badge:null,              page:'shop-tasse.html' }
];

/* =================================================================
   WARENKORB
================================================================= */
const PAYPAL_BUSINESS = 'ZTBGBVKBM4U2G';
const PAYPAL_CURRENCY = 'EUR';
const PAYPAL_URL      = 'https://www.paypal.com/cgi-bin/webscr';

let cart = [];
try { cart = JSON.parse(localStorage.getItem('anton_shop_cart') || '[]'); } catch(e) {}
function saveCart() { try { localStorage.setItem('anton_shop_cart', JSON.stringify(cart)); } catch(e) {} }

function addToCart(productId, e) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    const p = products.find(x => x.id === productId);
    if (!p) return;
    const existing = cart.find(i => i.id === productId);
    if (existing) { existing.qty++; }
    else { cart.push({ id: productId, name: p.name, emoji: p.emoji, price: p.price, qty: 1 }); }
    saveCart(); updateCartUI();
    showToast(`${p.emoji} ${p.name} hinzugefügt!`);
}

function changeQty(id, delta) {
    const item = cart.find(i => i.id === id);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
    saveCart(); updateCartUI();
}

function clearCart() { cart = []; saveCart(); updateCartUI(); }
function escId(k) { return k.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function updateCartUI() {
    const totalQty   = cart.reduce((s,i) => s + i.qty, 0);
    const totalPrice = cart.reduce((s,i) => s + i.price * i.qty, 0);

    document.querySelectorAll('.cart-badge-box').forEach(el => {
        el.textContent = totalQty;
        el.style.display = totalQty > 0 ? 'flex' : 'none';
    });

    document.querySelectorAll('.cart-box-items-inner').forEach(el => {
        if (!cart.length) {
            el.innerHTML = `<div class="cart-empty-msg"><i class="fa-solid fa-cart-shopping"></i>Noch leer.</div>`;
        } else {
            el.innerHTML = cart.map(item => `
                <div class="cart-item-row">
                    <span class="ci-emoji">${item.emoji}</span>
                    <div class="ci-info">
                        <div class="ci-name">${item.name}</div>
                        <div class="ci-price">${(item.price * item.qty).toFixed(2).replace('.',',')} €</div>
                    </div>
                    <div class="ci-qty">
                        <button class="ci-qty-btn" onclick="changeQty('${escId(item.id)}',-1)">−</button>
                        <span class="ci-qty-num">${item.qty}</span>
                        <button class="ci-qty-btn" onclick="changeQty('${escId(item.id)}',1)">+</button>
                    </div>
                    <button class="ci-del" onclick="changeQty('${escId(item.id)}',-99)"><i class="fa-solid fa-xmark"></i></button>
                </div>`).join('');
        }
    });

    document.querySelectorAll('.cart-box-footer-inner').forEach(el => {
        if (!cart.length) { el.innerHTML = ''; return; }
        el.innerHTML = `
            <div class="cart-total-row">
                <span>Gesamt</span>
                <span class="cart-total-price">${totalPrice.toFixed(2).replace('.',',')} €</span>
            </div>
            <button class="btn-paypal" onclick="checkoutPayPal()">
                <i class="fa-brands fa-paypal"></i> Mit PayPal zahlen
            </button>
            <button class="btn-cart-clear" onclick="clearCart()">Warenkorb leeren</button>`;
    });
}

function checkoutPayPal() {
    if (!cart.length) return;
    const form = document.createElement('form');
    form.method = 'post'; form.action = PAYPAL_URL; form.target = '_blank';
    const f = (n,v) => { const i = document.createElement('input'); i.type='hidden'; i.name=n; i.value=v; form.appendChild(i); };
    f('cmd','_cart'); f('upload','1'); f('business', PAYPAL_BUSINESS);
    f('currency_code', PAYPAL_CURRENCY); f('lc','DE');
    f('return', window.location.href); f('cancel_return', window.location.href);
    cart.forEach((item, idx) => {
        const n = idx + 1;
        f(`item_name_${n}`, `ANTON – ${item.name}`);
        f(`amount_${n}`, item.price.toFixed(2));
        f(`quantity_${n}`, item.qty);
    });
    document.body.appendChild(form); form.submit(); document.body.removeChild(form);
}

let toastTimer;
function showToast(msg) {
    const t = document.getElementById('cart-toast');
    if (!t) return;
    document.getElementById('toast-text').textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

/* =================================================================
   RENDER
================================================================= */
function buildShopHTML() {
    const hero = `
        <div class="shop-hero">
            <div class="shop-hero-text">
                <span class="shop-hero-tag"><i class="fa-solid fa-bolt"></i> ANTON Fan-Shop</span>
                <h2 class="shop-hero-title">Dein Merch<br>für die Familie</h2>
                <p class="shop-hero-sub">Limitiert &amp; liebevoll gemacht.</p>
            </div>
            <div class="shop-hero-emojis">
                <span>🧢</span><span>👕</span><span>🎶</span>
            </div>
        </div>`;

    const cards = products.map(p => {
        const badge = p.badge ? `<span class="product-badge">${p.badge}</span>` : '';
        return `
            <div class="product-card" onclick="window.location='${p.page}'">
                <div class="product-img-wrap">
                    <span class="product-emoji">${p.emoji}</span>${badge}
                </div>
                <div class="product-info">
                    <p class="product-name">${p.name}</p>
                    <p class="product-desc">${p.desc}</p>
                    <div class="product-footer">
                        <span class="product-price">${p.price.toFixed(2).replace('.',',')} €</span>
                        <button class="btn-add-cart" onclick="addToCart('${p.id}', event)">
                            <i class="fa-solid fa-cart-plus"></i> Korb
                        </button>
                    </div>
                </div>
            </div>`;
    }).join('');

    const cartBox = `
        <aside class="cart-box">
            <div class="cart-box-header">
                <div class="cart-box-header-left">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span>Warenkorb</span>
                </div>
                <span class="cart-badge-box"></span>
            </div>
            <div class="cart-box-items">
                <div class="cart-box-items-inner"></div>
            </div>
            <div class="cart-box-footer">
                <div class="cart-box-footer-inner"></div>
            </div>
        </aside>`;

    return `
        <div class="shop-outer">
            <div class="shop-main">
                ${hero}
                <div class="shop-bento-grid">${cards}</div>
            </div>
            ${cartBox}
        </div>`;
}

function renderShop() {
    const html = buildShopHTML();
    const d = document.getElementById('d-shop-content');
    const m = document.getElementById('m-shop-content');
    if (d) d.innerHTML = html;
    if (m) m.innerHTML = html;
    updateCartUI();
}

/* =================================================================
   DESKTOP MENU
================================================================= */
let dSidebarTimeout;
const dSidebar = document.getElementById('d-sidebar');
function resetDSidebarTimer() {
    clearTimeout(dSidebarTimeout);
    if (dSidebar && dSidebar.classList.contains('open'))
        dSidebarTimeout = setTimeout(() => dSidebar.classList.remove('open'), 5000);
}
function toggleDesktopMenu() {
    if (dSidebar) { dSidebar.classList.toggle('open'); if (dSidebar.classList.contains('open')) resetDSidebarTimer(); }
}
if (dSidebar) { dSidebar.addEventListener('mousemove', resetDSidebarTimer); dSidebar.addEventListener('click', resetDSidebarTimer); }
document.addEventListener('click', function(e) {
    if (window.innerWidth > 800) {
        const btn = document.querySelector('.d-menu-btn');
        if (dSidebar && !dSidebar.contains(e.target) && btn && !btn.contains(e.target) && dSidebar.classList.contains('open')) {
            dSidebar.classList.remove('open'); clearTimeout(dSidebarTimeout);
        }
    }
});

/* =================================================================
   MOBILE LOGIC
================================================================= */
const mSidebar = document.getElementById('m-sidebar');
const mMenuBtn = document.getElementById('m-menu-trigger');
const mIdBtn   = document.getElementById('m-id-btn');
const mIdPanel = document.getElementById('m-id-panel');
let mMenuTimeout, mIdTimeout;

function isLandscapeMobile() { return window.innerHeight <= 500 && window.innerWidth > window.innerHeight; }
function mCloseAllMenus() {
    if (mSidebar) mSidebar.classList.remove('open');
    if (mMenuBtn) mMenuBtn.classList.remove('active');
    clearTimeout(mMenuTimeout);
    if (!isLandscapeMobile()) {
        if (mIdPanel) mIdPanel.classList.remove('open');
        if (mIdBtn)   mIdBtn.classList.remove('hidden');
        clearTimeout(mIdTimeout);
    }
}
function mToggleMenu(e) {
    e.stopPropagation();
    if (mSidebar.classList.contains('open')) { mCloseAllMenus(); }
    else { mCloseAllMenus(); mSidebar.classList.add('open'); mMenuBtn.classList.add('active'); mMenuTimeout = setTimeout(mCloseAllMenus, 5000); }
}
function mOpenIDMenu(e) {
    e.stopPropagation(); mCloseAllMenus();
    if (mIdBtn)   mIdBtn.classList.add('hidden');
    if (mIdPanel) mIdPanel.classList.add('open');
    mIdTimeout = setTimeout(mCloseAllMenus, 5000);
}

function applyLandscapeState() {
    if (isLandscapeMobile()) {
        if (mIdPanel) mIdPanel.style.cssText = '';
        if (mIdBtn)   mIdBtn.style.display = 'none';
    } else {
        if (mIdBtn)   mIdBtn.style.display = '';
        if (mIdPanel) mIdPanel.classList.remove('open');
    }
}
window.addEventListener('resize', applyLandscapeState);
window.addEventListener('orientationchange', () => setTimeout(applyLandscapeState, 100));
applyLandscapeState();

document.addEventListener('click', e => {
    if (window.innerWidth <= 800 || isLandscapeMobile()) {
        if (mSidebar && !mSidebar.contains(e.target) &&
            mMenuBtn && !mMenuBtn.contains(e.target) &&
            mIdPanel && !mIdPanel.contains(e.target) &&
            mIdBtn   && !mIdBtn.contains(e.target)) mCloseAllMenus();
    }
});

setTimeout(() => {
    const mh = document.getElementById('m-header-main');
    if (mh && window.innerWidth <= 800) mh.style.transform = 'translateY(-100%)';
}, 3000);

renderShop();
</script>
